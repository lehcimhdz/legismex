name: Monitor Diario de Scrapers 🇲🇽

on:
  schedule:
    # Se ejecutará todos los días a las 09:00 UTC (03:00 AM hora CDMX)
    - cron: '0 9 * * *'
  
  # Para permitir ejecutarlo de forma manual con un botón desde Github Actions
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install httpx bs4 pydantic playwright rich
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install -e .[consejeria]
        playwright install chromium
        
    - name: Ejecutar Auditoría Global (verify.py --all)
      run: |
        python verify.py --all
      
    - name: Reporte de Falla
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          // Si el paso anterior fracasa, este bot abrirá un Issue de alerta.
          github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: '🚨 Alerta: Monitor Diario detectó una caída en un Scraper',
            body: `El monitor automatizado acaba de fallar.\n\nEs altamente probable que el HTML de algún portal del Gobierno haya cambiado de diseño, que haya expirado un certificado SSL, o que tengan protección de Cloudflare activa.\n\nRevisa la pestaña "Actions" de GitHub para ver el \`Traceback\` completo y saber cuál estado está afectado.`,
            labels: ['bug', 'automated-alert', 'scraper-falla']
          })
