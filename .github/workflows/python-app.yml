name: Legismex CI - Code Quality & Testing 🇲🇽

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest httpx bs4 pydantic playwright rich
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Instalar la librería en modo editable
        pip install -e .[consejeria]
        
    - name: Install Playwright browsers
      run: playwright install chromium
        
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 src/ tests/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
    - name: Run Smoke Test (Import Check)
      run: |
        # Validamos que el CLI y los importes base de Legismex funcionen correctamente.
        # Evitamos hacer requests HTTP reales a servidores gubernamentales en CI ya que son inestables y causan 'Failure'.
        python -c "import legismex; print('Legismex imported successfully!')"
